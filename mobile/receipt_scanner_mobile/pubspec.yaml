name: receipt_scanner_mobile
description: Receipt scanner Flutter module scaffold
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Networking
  http: ^1.4.0

  # Image capture
  image_picker: ^1.0.7

  # Firebase
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.0

  # Navigation
  go_router: ^13.2.0

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
