services:
  web:
    image: receipt_scanner_dev_web:latest
    container_name: receipt_scanner_dev_web
    build: .
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8010"
    volumes:
      - .:/app
    ports:
      - "8010:8010"
    env_file:
      - .env
    networks:
      - grocery_saving_dev_gs_backend_dev_network

  worker:
    image: receipt_scanner_dev_worker:latest
    container_name: receipt_scanner_dev_worker
    build: .
    command: celery -A core worker -l info -Q receipt_scanner
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - grocery_saving_dev_gs_backend_dev_network

networks:
  grocery_saving_dev_gs_backend_dev_network:
    external: true
